<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>  Criar Conta</h1>
        <p class="subtitle">Abra sua conta digital</p>

        {% with messages = get_flashed_messages() %}
            {% for msg in messages %}
                <div class="erro">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post">
            <input type="text" name="nome" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>

            <button type="submit">Cadastrar</button>
        </form>

        <p style="margin-top: 15px;">
            Já tem conta? <a href="/login" style="color:#38bdf8;">Entrar</a>
        </p>

    </div>

</div>

</body>
</html>
